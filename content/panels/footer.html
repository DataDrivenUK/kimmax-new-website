<!-- Footer -->
<footer id="footer">
	<div class="inner">
		<section id="contact">
			<h2>Get in touch</h2>
			<form id="contact_form" method="post" action="#">
				<input type="hidden" name="access_key" value="83805e2f-8ebb-4900-b2cc-b1165ac3719f">
				<input type="hidden" name="subject" value="New enquiry from the new Kimmax.co.uk">
				<input type="hidden" name="from_name" value="Kimmax Website">
				<div class="fields">
					<div class="field half">
						<input type="text" name="name" id="name" placeholder="Name" required />
					</div>
					<div class="field half">
						<input type="email" name="email" id="email" placeholder="Email" required />
					</div>
					<div class="field">
						<textarea name="message" id="message" placeholder="Message" required></textarea>
					</div>
				</div>
				<ul class="actions">
					<li><input type="submit" id="btn_submit" value="Send" class="primary" /></li>
					<li><span id="btn_sending" style="display:none; line-height:2.5em;">Sending&hellip;</span></li>
				</ul>
				<p id="form_success" style="display:none; color:#a8dba8;">Thank you — we'll be in touch soon!</p>
				<p id="form_error" style="display:none; color:#e88;">Something went wrong — please email us directly at <a href="mailto:peter@kimmax.co.uk">peter@kimmax.co.uk</a></p>
			</form>
		</section>
		<section>
			<h2>Follow</h2>
			<ul class="icons">
				<li><a href="#" class="icon brands style2 fa-facebook-f"><span class="label">Facebook</span></a></li>
				<li><a href="#" class="icon brands style2 fa-instagram"><span class="label">Instagram</span></a></li>
				<li><a href="#" class="icon brands style2 fa-youtube"><span class="label">YouTube</span></a></li>
				<li><a href="#" class="icon solid style2 fa-envelope"><span class="label">Email</span></a></li>
			</ul>
		</section>
		<ul class="copyright">
			<li>&copy; Kimmax 2026 &ndash; All rights reserved</li>
		</ul>
	</div>
</footer>

<!-- Contact Form Script -->
<script>
(function() {
	var form = document.getElementById('contact_form');
	if (!form) return;
	form.addEventListener('submit', function(e) {
		e.preventDefault();
		var btn = document.getElementById('btn_submit');
		var sending = document.getElementById('btn_sending');
		var success = document.getElementById('form_success');
		var error = document.getElementById('form_error');
		btn.style.display = 'none';
		sending.style.display = 'inline';
		fetch('https://api.web3forms.com/submit', {
			method: 'POST',
			body: new FormData(form)
		})
		.then(function(res) { return res.json(); })
		.then(function(data) {
			sending.style.display = 'none';
			btn.style.display = 'inline';
			if (data.success) {
				success.style.display = 'block';
				form.reset();
			} else {
				error.style.display = 'block';
			}
		})
		.catch(function() {
			sending.style.display = 'none';
			btn.style.display = 'inline';
			error.style.display = 'block';
		});
	});
})();
</script>
